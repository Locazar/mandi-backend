# Deployment configuration for Enquiry Notification Cloud Function
# This file deploys the Cloud Function via GCP

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/enquiry-notification-handler:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/enquiry-notification-handler:$COMMIT_SHA'
      - '-f'
      - 'cmd/cloudfunctions/enquiry-notification-handler/Dockerfile'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/enquiry-notification-handler:$COMMIT_SHA'

  # Deploy to Cloud Run (which hosts Cloud Functions Gen 2)
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - '--filename=cmd/cloudfunctions/enquiry-notification-handler/'
      - '--image=gcr.io/$PROJECT_ID/enquiry-notification-handler:$COMMIT_SHA'
      - '--location=$_REGION'

# Build configuration
images:
  - 'gcr.io/$PROJECT_ID/enquiry-notification-handler:latest'
  - 'gcr.io/$PROJECT_ID/enquiry-notification-handler:$COMMIT_SHA'

# Substitutions
substitutions:
  _REGION: 'us-central2'
  _SERVICE_NAME: 'enquiry-notification-handler'

# Timeout for build
timeout: 1800s

# Standard cloud build options
options:
  machineType: 'N1_HIGHCPU_8'
