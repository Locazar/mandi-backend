version: '3'
services:
# database container
  postgresdb:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: rohitjangid
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: mandi
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ecommerce-network
# webapp container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rohit221990/mandi-backend
    ports:
      - 3000:3000
    env_file:
      - .env
    environment:
      - DB_HOST=postgresdb
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgresdb
    restart: always
    networks:
      - ecommerce-network

# ai-service container
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    image: rohit221990/ai-service
    container_name: ai-service
    ports:
      - "3001:3001"
    env_file:
      - ../ai-service/.env
    environment:
      - AI_SERVICE_PORT=3001
    depends_on:
      - postgresdb
    restart: unless-stopped
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# for persistent data storage
volumes:
  database:

networks:
  ecommerce-network:
    driver: bridge
 